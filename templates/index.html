<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>LoL Build Helper</title>
    <style>
        :root { --hextech-gold: #c8aa6e; --hextech-blue: #005a82; --border-color: #785a28; }
        body { 
            background: #010a13; 
            background-image: linear-gradient(rgba(1, 10, 19, 0.8), rgba(1, 10, 19, 0.8)), url('https://images.contentstack.io/v3/assets/blt731eb9a2f629f343/blt80963283626e829d/5ed6945f3408ec0732895697/summonersrift.jpg');
            background-size: cover; color: #f0e6d2; font-family: sans-serif; display: flex; justify-content: center; padding: 20px;
        }
        .container { max-width: 600px; width: 100%; background: rgba(9, 20, 40, 0.9); border: 2px solid var(--border-color); padding: 20px; text-align: center; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #1e2328; color: white; border: 1px solid var(--border-color); }
        button { padding: 10px 20px; background: var(--hextech-blue); color: white; border: 1px solid #0ac8b9; cursor: pointer; text-transform: uppercase; }
        #result { margin: 20px 0; padding: 10px; border-top: 1px solid var(--border-color); }
        details { margin-top: 20px; text-align: left; border: 1px solid var(--border-color); }
        summary { padding: 10px; cursor: pointer; color: var(--hextech-gold); }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LoL Build Helper</h1>
        <input type="text" id="prompt" placeholder="Hraju Ahri proti Ashe...">
        <button onclick="askAI()">Poradit</button>
        <div id="result"></div>

        <details>
            <summary onclick="nactiHistorii()">Zobrazit historii chatů</summary>
            <div style="max-height: 200px; overflow-y: auto;">
                <table>
                    <thead><tr><th>Čas</th><th>Dotaz</th><th>Odpověď</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </details>
    </div>

    <script>
        async function askAI() {
            const prompt = document.getElementById('prompt').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "Kovám build...";
            const response = await fetch('/ai', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: prompt})
            });
            const data = await response.json();
            resDiv.innerText = data.odpoved || data.chyba;
        }

        async function nactiHistorii() {
            const response = await fetch('/historie');
            const data = await response.json();
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${new Date(item.cas).toLocaleString()}</td>
                    <td>${item.dotaz}</td>
                    <td>${item.odpoved}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
