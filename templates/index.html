<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Build Helper | Pro Player Assistant</title>
    <style>
        :root {
            --hextech-gold: #c8aa6e;
            --hextech-blue: #005a82;
            --dark-blue: #091428;
            --black: #010a13;
            --gold-bright: #f0e6d2;
            --border-color: #785a28;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--black);
            /* Pozadí: Vyvolávačův žleb */
            background-image: linear-gradient(rgba(1, 10, 19, 0.85), rgba(1, 10, 19, 0.85)), 
                              url('http://googleusercontent.com/image_collection/image_retrieval/4129830341560428307_0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--gold-bright);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(9, 20, 40, 0.95);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .champ-header {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 25px;
            gap: 10px;
        }

        .champ-box {
            flex: 1;
            border: 1px solid var(--border-color);
            padding: 5px;
            background: #010a13;
            border-radius: 4px;
        }

        .champ-img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            object-position: top;
            display: block;
            border: 1px solid #3c3c41;
        }

        .champ-label {
            font-size: 0.8rem;
            color: var(--hextech-gold);
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: bold;
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--hextech-gold);
            margin: 15px 0 5px 0;
            font-size: 1.6rem;
        }

        .vs-text {
            font-size: 1.2rem;
            color: var(--hextech-gold);
            font-weight: bold;
            font-style: italic;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        input {
            padding: 15px;
            border: 1px solid var(--border-color);
            background: #1e2328;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        button {
            padding: 15px;
            background: var(--hextech-blue);
            color: white;
            border: 1px solid #0ac8b9;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.3);
            background: #007aae;
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            min-height: 40px;
            color: #f0e6d2;
        }

        @media (max-width: 500px) {
            .champ-img { height: 80px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="champ-header">
            <div class="champ-box">
                <img src="http://googleusercontent.com/image_collection/image_retrieval/6486068596896120400_0" alt="Ahri" class="champ-img">
                <div class="champ-label">Tvoje Ahri</div>
            </div>
            <div class="vs-text">VS</div>
            <div class="champ-box">
                <img src="http://googleusercontent.com/image_collection/image_retrieval/859734764689216311_0" alt="Ashe" class="champ-img">
                <div class="champ-label">Nepřítel</div>
            </div>
        </div>

        <h1>Build Helper</h1>
        <p style="color: #a09b8c; margin-bottom: 20px;">Ovládni žleb s nejlepším vybavením</p>
        
        <div class="input-group">
            <input type="text" id="prompt" placeholder="Hraju Ahri proti Ashe a Mundo...">
            <button onclick="askAI()">Analyzovat zápas</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        async function askAI() {
            const prompt = document.getElementById('prompt').value;
            const resDiv = document.getElementById('result');
            if (!prompt) { resDiv.innerText = "Zadej detaily zápasu!"; return; }

            resDiv.innerHTML = '<span style="color: #c8aa6e;">Vyvolávám moudrost...</span>';
            
            try {
                const response = await fetch('/ai', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: prompt})
                });
                const data = await response.json();
                resDiv.innerText = data.odpoved || data.chyba;
            } catch (error) {
                resDiv.innerText = "Server neodpovídá.";
            }
        }
    </script>
</body>
</html>
